apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: ai-devsecops-eks
  region: ap-south-1
  version: "1.30"

availabilityZones:
  - ap-south-1a
  - ap-south-1b

managedNodeGroups:
  - name: app-ng
    instanceType: t3.small
    desiredCapacity: 2
    minSize: 1
    maxSize: 3
    volumeSize: 20
    privateNetworking: false
    labels:
      workload: app
    tags:
      project: ai-guardian-devsecops
      owner: portfolio

iam:
  withOIDC: true

cloudWatch:
  clusterLogging:
    enableTypes:
      - api
      - audit
      - authenticator
      - controllerManager
      - scheduler
