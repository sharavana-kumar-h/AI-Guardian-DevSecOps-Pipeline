apiVersion: v1
kind: ServiceAccount
metadata:
  name: ai-devsecops-demo
  namespace: ai-devsecops
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ai-devsecops-demo-readonly
  namespace: ai-devsecops
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ai-devsecops-demo-readonly
  namespace: ai-devsecops
subjects:
  - kind: ServiceAccount
    name: ai-devsecops-demo
    namespace: ai-devsecops
roleRef:
  kind: Role
  name: ai-devsecops-demo-readonly
  apiGroup: rbac.authorization.k8s.io
