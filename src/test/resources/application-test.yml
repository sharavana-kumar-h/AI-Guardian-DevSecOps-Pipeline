spring:
  datasource:
    url: jdbc:h2:mem:devsecops-test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
  main:
    banner-mode: off
logging:
  level:
    root: WARN
