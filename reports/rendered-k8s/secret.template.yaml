apiVersion: v1
kind: Secret
metadata:
  name: ai-devsecops-demo-db
  namespace: ai-devsecops
type: Opaque
stringData:
  # Replace these values before real deployment or use External Secrets/Sealed Secrets.
  SPRING_DATASOURCE_URL: "jdbc:postgresql://YOUR_RDS_ENDPOINT:5432/devsecops"
  SPRING_DATASOURCE_USERNAME: "devsecops_user"
  SPRING_DATASOURCE_PASSWORD: "CHANGE_ME"
